apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "devops-platform.fullname" . }}-config
  labels:
    {{- include "devops-platform.labels" . | nindent 4 }}
data:
  APP_NAME: {{ .Values.config.appName | quote }}
  APP_ENV: {{ .Values.config.appEnv | quote }}
  APP_VERSION: {{ .Values.config.appVersion | quote }}
