replicaCount: 2

image:
  repository: ghcr.io/REPLACE_ME/devops-platform-lab
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  host: devops-platform.local

config:
  appName: DevOps Platform Lab
  appEnv: kubernetes
  appVersion: 1.0.0

secret:
  apiToken: replace-me

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1
