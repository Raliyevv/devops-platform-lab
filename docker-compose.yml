services:
  app:
    build:
      context: .
    container_name: devops-platform-app
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - platform-network

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: devops-platform-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - platform-network

  grafana:
    image: grafana/grafana:12.0.2
    container_name: devops-platform-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - platform-network

networks:
  platform-network:
    driver: bridge

volumes:
  grafana-data:
